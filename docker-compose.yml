services:

  neo4j:
    build: ./neo4j
    container_name: self-healing-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/password123"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  loader:
    build:
      context: .
      dockerfile: ./loader/Dockerfile
    container_name: self-healing-loader
    restart: "no"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
    volumes:
      - ./loader/output:/app/loader/output   # persist graph.json + hashes sidecar
      - repo_code:/repo                       # the repo to parse (mounted by deploy.sh)
    command: ["--input", "/repo", "--output", "loader/output/graph.json"]
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  repo_code:
